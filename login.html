<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login | ConectaElas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="container">
      <a href="index.html">Voltar para Home</a>
    </nav>
  </header>
  <main class="container container-centralizado">
    <section class="form-box" style="max-width:380px;">
      <h1>Entrar</h1>
      <form action="#" method="POST">
        <div class="campo">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="campo">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" required>
        </div>
        <button type="submit" class="btn-principal">Entrar</button>
      </form>
    </section>
  </main>
  <footer>
        <div class="container">
            <p>&copy; 2026 ConectaElas. Desenvolvido por:</p>
            <ul class="equipe">
                <li><a href="https://github.com/LevysLopes" target="_blank">Levy Gaspar</a></li>
                <li><a href="https://github.com/carloseduardomf" target="_blank">Carlos Eduardo Martins Ferreira</a></li>
            </ul>
            
            <div class="selo-w3c">
                <a href="https://jigsaw.w3.org/css-validator/validator?uri=https://levyslopes.github.io/conecta_elas.io/" target="_blank">
                    <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="CSS válido!">
                </a>
            </div>
        </div>
  </footer>
</body>
</html>
